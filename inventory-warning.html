<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>庫存預警系統 — 易藍琪</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0d1b2a;
    --navy-2: #152234;
    --navy-3: #1e2e42;
    --navy-4: #263850;
    --gold: #c9a84c;
    --gold-light: #e2c47e;
    --gold-dim: rgba(201,168,76,0.15);
    --text: #e8e0d0;
    --text-dim: #8a9ab0;
    --text-muted: #4a5a70;
    --danger: #e05c5c;
    --danger-bg: rgba(224,92,92,0.12);
    --warning: #e8a44a;
    --warning-bg: rgba(232,164,74,0.12);
    --ok: #5caa7a;
    --ok-bg: rgba(92,170,122,0.12);
    --border: rgba(201,168,76,0.18);
    --border-dim: rgba(255,255,255,0.06);
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--navy-2);
  }
  .brand {
    font-size: 15px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.06em;
  }
  .brand span { color: var(--text-dim); font-weight: 400; font-size: 13px; margin-left: 10px; }
  .sync-info { font-size: 12px; color: var(--text-muted); }
  .sync-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--ok); margin-right: 5px; }
  .sync-dot.err { background: var(--danger); }

  /* ── LAYOUT ── */
  .main { padding: 24px 28px; max-width: 1200px; margin: 0 auto; }

  /* ── ALERT BANNER ── */
  .alert-banner {
    background: var(--danger-bg);
    border: 1px solid rgba(224,92,92,0.3);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-size: 13px;
    color: var(--danger);
    margin-bottom: 20px;
    display: none;
  }
  .alert-banner.show { display: flex; align-items: center; gap: 8px; }

  /* ── METRICS ── */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .metric {
    background: var(--navy-2);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius);
    padding: 16px 20px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .metric:hover, .metric.active { border-color: var(--gold); }
  .metric-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 6px; }
  .metric-val { font-size: 28px; font-weight: 600; }
  .metric-val.danger { color: var(--danger); }
  .metric-val.warning { color: var(--warning); }
  .metric-val.ok { color: var(--ok); }
  .metric-val.gold { color: var(--gold); }

  /* ── CONTROLS ── */
  .controls { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .controls-left { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    font-size: 12px; padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid var(--border-dim);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border); color: var(--text); }
  .filter-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .search-box {
    flex: 1; min-width: 180px;
    background: var(--navy-3);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-sm);
    padding: 7px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--border); }
  .search-box::placeholder { color: var(--text-muted); }
  .add-btn {
    font-size: 13px; padding: 7px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--gold);
    background: var(--gold-dim);
    color: var(--gold);
    cursor: pointer;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .add-btn:hover { background: rgba(201,168,76,0.25); }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-size: 11px; font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-align: left;
    padding: 0 14px 10px;
    border-bottom: 1px solid var(--border-dim);
    white-space: nowrap;
  }
  thead th.r { text-align: right; }
  tbody tr {
    border-bottom: 1px solid var(--border-dim);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--navy-3); }
  tbody td { padding: 11px 14px; vertical-align: middle; }
  tbody td.r { text-align: right; }
  .prod-name { font-weight: 500; font-size: 13px; color: var(--text); }
  .prod-sku { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .qty-val { font-size: 15px; font-weight: 600; }
  .qty-val.danger { color: var(--danger); }
  .qty-val.warning { color: var(--warning); }
  .qty-val.ok { color: var(--text); }

  .bar-wrap { width: 80px; height: 5px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; display: inline-block; }
  .bar-fill { height: 100%; border-radius: 99px; }
  .bar-fill.danger { background: var(--danger); }
  .bar-fill.warning { background: var(--warning); }
  .bar-fill.ok { background: var(--ok); }

  .badge { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 500; white-space: nowrap; }
  .badge.danger { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(224,92,92,0.25); }
  .badge.warning { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(232,164,74,0.25); }
  .badge.ok { background: var(--ok-bg); color: var(--ok); border: 1px solid rgba(92,170,122,0.25); }

  .safety-row { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
  .safety-input {
    width: 62px; text-align: center;
    background: var(--navy-3);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-sm);
    padding: 4px 6px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .safety-input:focus { border-color: var(--border); }
  .save-btn {
    font-size: 11px; padding: 4px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-dim);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .save-btn:hover { border-color: var(--gold); color: var(--gold); }
  .save-btn.ok { border-color: var(--ok); color: var(--ok); }

  .del-btn {
    font-size: 11px; padding: 4px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .del-btn:hover { border-color: rgba(224,92,92,0.3); color: var(--danger); }

  .adj-btn {
    font-size: 11px; padding: 4px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-dim);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .adj-btn:hover { border-color: var(--border); color: var(--text); }

  .actions-cell { display: flex; gap: 5px; align-items: center; justify-content: flex-end; }
  .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
  .loading { text-align: center; padding: 40px; color: var(--text-muted); }

  /* ── MODAL ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--navy-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 340px;
    max-width: 95vw;
  }
  .modal-title { font-size: 15px; font-weight: 600; color: var(--gold); margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 5px; }
  .field input, .field select {
    width: 100%;
    background: var(--navy-3);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--border); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel {
    font-size: 13px; padding: 7px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-dim);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
  }
  .btn-confirm {
    font-size: 13px; padding: 7px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--gold);
    background: var(--gold-dim);
    color: var(--gold);
    cursor: pointer;
    font-weight: 500;
  }
  .btn-confirm:hover { background: rgba(201,168,76,0.25); }

  /* ── ADJ MODAL ── */
  .adj-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .adj-tab {
    flex: 1; padding: 7px; text-align: center;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-dim);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
  }
  .adj-tab.active.in { border-color: var(--ok); color: var(--ok); background: var(--ok-bg); }
  .adj-tab.active.out { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }

  @media (max-width: 640px) {
    .main { padding: 16px; }
    .metrics { grid-template-columns: repeat(2,1fr); }
    .topbar { padding: 12px 16px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">易藍琪 iilucky ART <span>庫存預警系統</span></div>
  <div class="sync-info"><span class="sync-dot" id="syncDot"></span><span id="syncText">連線中...</span></div>
</div>

<div class="main">
  <!-- ALERT BANNER -->
  <div class="alert-banner" id="alertBanner">
    <span>⚠</span><span id="alertText"></span>
  </div>

  <!-- METRICS -->
  <div class="metrics">
    <div class="metric" onclick="filterBy('danger')" id="m-danger">
      <div class="metric-label">緊急缺貨</div>
      <div class="metric-val danger" id="cnt-danger">—</div>
    </div>
    <div class="metric" onclick="filterBy('warning')" id="m-warning">
      <div class="metric-label">低庫存</div>
      <div class="metric-val warning" id="cnt-warning">—</div>
    </div>
    <div class="metric" onclick="filterBy('ok')" id="m-ok">
      <div class="metric-label">庫存正常</div>
      <div class="metric-val ok" id="cnt-ok">—</div>
    </div>
    <div class="metric" onclick="filterBy('all')" id="m-all">
      <div class="metric-label">商品總數</div>
      <div class="metric-val gold" id="cnt-total">—</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="controls-left">
      <button class="filter-btn active" id="fb-all"    onclick="filterBy('all')">全部</button>
      <button class="filter-btn"        id="fb-danger" onclick="filterBy('danger')">緊急缺貨</button>
      <button class="filter-btn"        id="fb-warning" onclick="filterBy('warning')">低庫存</button>
      <button class="filter-btn"        id="fb-ok"     onclick="filterBy('ok')">正常</button>
    </div>
    <input class="search-box" id="searchBox" placeholder="搜尋商品名稱或 SKU..." oninput="debounceLoad()" />
    <button class="add-btn" onclick="openAddModal()">＋ 新增商品</button>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>商品</th>
          <th class="r">現有庫存</th>
          <th>庫存比例</th>
          <th class="r">安全庫存</th>
          <th>狀態</th>
          <th class="r">操作</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6" class="loading">載入中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 新增商品 MODAL -->
<div class="overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">＋ 新增商品</div>
    <div class="field"><label>商品名稱 *</label><input id="mName" placeholder="例：紫水晶手鍊 M號" /></div>
    <div class="field"><label>SKU / 品號 *</label><input id="mSku" placeholder="例：BRC-022" /></div>
    <div class="field"><label>現有庫存</label><input id="mQty" type="number" min="0" value="0" /></div>
    <div class="field"><label>安全庫存量</label><input id="mSafety" type="number" min="1" value="10" /></div>
    <div class="field"><label>分類</label>
      <select id="mCat">
        <option>能量噴霧</option><option>手鍊</option><option>項鍊</option>
        <option>耳環</option><option>戒指</option><option>水晶</option>
        <option>居家擺件</option><option>香氛</option><option>未分類</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('addModal')">取消</button>
      <button class="btn-confirm" onclick="addProduct()">新增</button>
    </div>
  </div>
</div>

<!-- 調整庫存 MODAL -->
<div class="overlay" id="adjModal">
  <div class="modal">
    <div class="modal-title" id="adjTitle">調整庫存</div>
    <div class="adj-tabs">
      <button class="adj-tab active in" id="adjIn" onclick="setAdjMode('in')">進貨 ＋</button>
      <button class="adj-tab out" id="adjOut" onclick="setAdjMode('out')">出貨 −</button>
    </div>
    <div class="field"><label>數量</label><input id="adjQty" type="number" min="1" value="1" /></div>
    <div class="field"><label>原因</label>
      <select id="adjReason">
        <option value="進貨">進貨</option>
        <option value="銷售">銷售</option>
        <option value="盤點調整">盤點調整</option>
        <option value="退貨">退貨</option>
        <option value="手動調整">手動調整</option>
      </select>
    </div>
    <input type="hidden" id="adjId" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('adjModal')">取消</button>
      <button class="btn-confirm" onclick="submitAdj()">確認</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:3001/api/inventory';
let currentFilter = 'all';
let adjMode = 'in';
let saveTimers = {};
let searchTimer;

// ── UTILS ──
function status(qty, safety) {
  if (qty === 0) return 'danger';
  if (qty < Math.ceil(safety * 0.5)) return 'danger';
  if (qty < safety) return 'warning';
  return 'ok';
}
function statusLabel(qty, safety) {
  if (qty === 0) return '已斷貨';
  if (qty < Math.ceil(safety * 0.5)) return '緊急缺貨';
  if (qty < safety) return '低庫存';
  return '庫存正常';
}
function barPct(qty, safety) {
  return Math.min(100, Math.round((qty / (safety * 2)) * 100));
}
function setSync(ok) {
  document.getElementById('syncDot').className = 'sync-dot' + (ok ? '' : ' err');
  document.getElementById('syncText').textContent = ok ? '已連線 Supabase' : '連線失敗';
}

// ── FILTER ──
function filterBy(f) {
  currentFilter = f;
  ['all','danger','warning','ok'].forEach(k => {
    const fb = document.getElementById('fb-' + k);
    const m  = document.getElementById('m-' + k);
    if (fb) fb.classList.toggle('active', k === f);
    if (m)  m.classList.toggle('active', k === f);
  });
  loadData();
}

function debounceLoad() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadData, 300);
}

// ── LOAD DATA ──
async function loadData() {
  const search = document.getElementById('searchBox').value.trim();
  let url = API + `?status=${currentFilter}`;
  if (search) url += `&search=${encodeURIComponent(search)}`;

  try {
    const res = await fetch(url);
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    setSync(true);
    renderMetrics(json.summary);
    renderTable(json.data || []);
    renderAlert(json.summary);
  } catch (e) {
    setSync(false);
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="6" class="empty-state">⚠ 無法連線 API：${e.message}</td></tr>`;
  }
}

function renderMetrics(s) {
  document.getElementById('cnt-danger').textContent = s.danger ?? '—';
  document.getElementById('cnt-warning').textContent = s.warning ?? '—';
  document.getElementById('cnt-ok').textContent = s.ok ?? '—';
  document.getElementById('cnt-total').textContent = s.total ?? '—';
}

function renderAlert(s) {
  const b = document.getElementById('alertBanner');
  const t = document.getElementById('alertText');
  if (s.danger > 0) {
    b.classList.add('show');
    t.textContent = `目前有 ${s.danger} 項商品需要緊急補貨，${s.out_of_stock} 項已完全斷貨`;
  } else {
    b.classList.remove('show');
  }
}

function renderTable(items) {
  const tbody = document.getElementById('tbody');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">沒有符合條件的商品</td></tr>';
    return;
  }
  tbody.innerHTML = items.map(p => {
    const st = status(p.qty, p.safety_qty);
    const pct = barPct(p.qty, p.safety_qty);
    return `<tr>
      <td>
        <div class="prod-name">${escHtml(p.name)}</div>
        <div class="prod-sku">${escHtml(p.sku)} · ${escHtml(p.category||'')}</div>
      </td>
      <td class="r"><span class="qty-val ${st}">${p.qty}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="bar-wrap"><div class="bar-fill ${st}" style="width:${pct}%"></div></div>
          <span style="font-size:11px;color:#4a5a70;">${pct}%</span>
        </div>
      </td>
      <td class="r">
        <div class="safety-row">
          <input class="safety-input" id="si-${p.id}" type="number" min="0"
            value="${p.safety_qty}" onchange="scheduleSave(${p.id})" />
          <button class="save-btn" id="sb-${p.id}" onclick="saveSafety(${p.id})">儲存</button>
        </div>
      </td>
      <td><span class="badge ${st}">${statusLabel(p.qty, p.safety_qty)}</span></td>
      <td>
        <div class="actions-cell">
          <button class="adj-btn" onclick="openAdj(${p.id}, '${escHtml(p.name)}')">調整庫存</button>
          <button class="del-btn" onclick="delProduct(${p.id}, '${escHtml(p.name)}')">刪除</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── SAFETY SAVE ──
function scheduleSave(id) {
  const btn = document.getElementById('sb-' + id);
  if (btn) { btn.textContent = '儲存'; btn.className = 'save-btn'; }
}

async function saveSafety(id) {
  const input = document.getElementById('si-' + id);
  const btn   = document.getElementById('sb-' + id);
  const val   = parseInt(input.value);
  if (isNaN(val) || val < 0) return;
  try {
    const res = await fetch(`${API}/${id}/safety`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ safety_qty: val })
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    btn.textContent = '已儲存';
    btn.className = 'save-btn ok';
    setTimeout(() => loadData(), 400);
  } catch (e) {
    btn.textContent = '失敗';
    alert('儲存失敗：' + e.message);
  }
}

// ── ADD PRODUCT ──
function openAddModal() { document.getElementById('addModal').classList.add('open'); }

async function addProduct() {
  const name   = document.getElementById('mName').value.trim();
  const sku    = document.getElementById('mSku').value.trim();
  const qty    = parseInt(document.getElementById('mQty').value) || 0;
  const safety = parseInt(document.getElementById('mSafety').value) || 10;
  const cat    = document.getElementById('mCat').value;
  if (!name || !sku) return alert('商品名稱與 SKU 為必填');

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, sku, qty, safety_qty: safety, category: cat })
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    closeModal('addModal');
    loadData();
  } catch (e) { alert('新增失敗：' + e.message); }
}

// ── ADJUST QTY ──
function openAdj(id, name) {
  document.getElementById('adjId').value = id;
  document.getElementById('adjTitle').textContent = '調整庫存 — ' + name;
  document.getElementById('adjQty').value = 1;
  setAdjMode('in');
  document.getElementById('adjModal').classList.add('open');
}
function setAdjMode(mode) {
  adjMode = mode;
  const inBtn  = document.getElementById('adjIn');
  const outBtn = document.getElementById('adjOut');
  inBtn.className  = 'adj-tab' + (mode === 'in'  ? ' active in'  : '');
  outBtn.className = 'adj-tab' + (mode === 'out' ? ' active out' : '');
}
async function submitAdj() {
  const id     = document.getElementById('adjId').value;
  const qty    = parseInt(document.getElementById('adjQty').value) || 1;
  const reason = document.getElementById('adjReason').value;
  const delta  = adjMode === 'in' ? qty : -qty;

  try {
    const res = await fetch(`${API}/${id}/qty`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ change_qty: delta, reason })
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    closeModal('adjModal');
    loadData();
  } catch (e) { alert('調整失敗：' + e.message); }
}

// ── DELETE ──
async function delProduct(id, name) {
  if (!confirm(`確定要刪除「${name}」？此操作無法復原。`)) return;
  try {
    const res  = await fetch(`${API}/${id}`, { method: 'DELETE' });
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    loadData();
  } catch (e) { alert('刪除失敗：' + e.message); }
}

// ── MODAL CLOSE ──
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ── INIT ──
loadData();
setInterval(loadData, 30000); // 每30秒自動刷新
</script>
</body>
</html>
