/* ?Җ?Җ HERO ?Җ?Җ */
#hero {

/* ?Җ?Җ PRODUCTS ?Җ?Җ */
#products {
  background: var(--navy);
}
.products-header {
  text-align: center;
  margin-bottom: 60px;
}
.products-tabs {
  display: flex; justify-content: center; gap: 0;
  margin-bottom: 48px;
  border: 1px solid var(--border);
  display: inline-flex;

  transform: translateX(-50%);
}
.product-tab {
  padding: 12px 32px;
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 12px;

}
.product-tab:hover:not(.active) { color: var(--gold3); }
.products-grid {

  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  max-width: 1200px;
  margin: 0 auto;
}
.product-card {
  background: var(--navy2);
  border: 1px solid var(--border);

  overflow: hidden;

  transition: all 0.4s;

}
.product-card:hover {
  border-color: rgba(212,175,55,0.4);

}
.product-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;

  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.product-card:hover::before { opacity: 1; }
.product-img {
  aspect-ratio: 1;

  overflow: hidden;
}
.product-img-inner {
  font-size: 64px;
  filter: drop-shadow(0 0 16px rgba(212,175,55,0.3));
  transition: transform 0.4s;
}
.product-card:hover .product-img-inner {

}
.product-img-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 60%, rgba(6,12,26,0.8));
}
.product-badge {
  position: absolute; top: 12px; right: 12px;

.product-info {

.product-cat {

}
.product-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 16px;
  font-weight: 400;
  margin-bottom: 6px;
  color: var(--white);
  letter-spacing: 1px;

.product-desc {
  font-size: 12px;

.product-price {

async function applyWebThemeFromDB() {
  try {
    const res = await sbFetch('settings', 'key=eq.web_theme&select=value');
    if(!res || res.length === 0) return;
    const theme = JSON.parse(res[0].value);
    if(!theme) return;

    // еҘ—з”Ё CSS и®Ҡж•ё
    const root = document.documentElement.style;
    if(theme.bg) {
      root.setProperty('--navy', theme.bg);
      // иЁҲз?зЁҚдә®?„и?й«?      root.setProperty('--navy2', theme.bg + 'dd');
      document.body.style.background = theme.bg;
    }
    if(theme.primary) {
      root.setProperty('--gold', theme.primary);
    }
    if(theme.text) {
      root.setProperty('--white', theme.text);
    }

    // еҘ—з”Ё?Үе??§е®№
    const heroTitle = document.querySelector('.hero-title');
    if(heroTitle && theme.heroTitle) {
      heroTitle.innerHTML = theme.heroTitle.replace('iilucky', '<em>iilucky</em>').replace('ART', 'ART');
    }
    const heroSub = document.querySelector('.hero-subtitle-zh');
    if(heroSub && theme.heroSub) heroSub.textContent = theme.heroSub;

    const heroDesc = document.querySelector('.hero-desc');
    if(heroDesc && theme.heroDesc) heroDesc.textContent = theme.heroDesc;

    const btnPrimary = document.querySelector('.btn-primary');
    if(btnPrimary && theme.btnPrimary) btnPrimary.textContent = theme.btnPrimary;

    // еҘ—з”Ёеӯ—й?еӨ§е?
    if(theme.titleSize && heroTitle) {
      heroTitle.style.fontSize = Math.min(parseInt(theme.titleSize), 96) + 'px';
    }

    console.log('??е®ҳз¶Ідё»й?е·Іе?еҫҢеҸ°еҘ—з”Ё');
  } catch(e) {
    console.log('дҪҝз”Ё?җиЁӯдё»й?');
  }
}

// ?Җ?Җ SPA Navigation ?Җ?Җ
function showPage(pageId) {
  // Hide hero
  const hero = document.getElementById('hero');
  const heroScrollBtn = document.querySelector('.hero-scroll');

  // Hide all sections
  document.querySelectorAll('.page-section').forEach(s => {
    s.classList.remove('active');
  });

  if(pageId === 'home' || !pageId) {
    // Show hero
    if(hero) { hero.style.display = 'flex'; }
    updateNavActive(null);
  } else {
    // Hide hero
    if(hero) { hero.style.display = 'none'; }
    // Show target section
    const target = document.getElementById(pageId);
    if(target) {
      target.classList.add('active');
      window.scrollTo(0, 0);
    }
    updateNavActive(pageId);
  }
}

function updateNavActive(pageId) {
  document.querySelectorAll('.nav-links a').forEach(a => {

    if(activeLink) {
      activeLink.style.color = 'var(--gold)';
      activeLink.style.borderBottom = '1px solid var(--gold)';
    }
  }
}
